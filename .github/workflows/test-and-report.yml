name: CI - Tests et Couverture

on:
  push:
    branches: [ version-4, main ]
  pull_request:
    branches: [ version-4, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      docker:
        image: docker:dind

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Run tests with coverage
        working-directory: ./api-spring-boot/etudiant-api
        run: mvn verify -B

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: api-spring-boot/etudiant-api/target/site/jacoco/

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Tests
          path: api-spring-boot/etudiant-api/target/surefire-reports/*.xml
          reporter: java-junit