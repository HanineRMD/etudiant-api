server:
  port: 8888

spring:
  application:
    name: API-GATEWAY
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true  # ← Garde true
      routes:
        - id: etudiant-service
          uri: lb://etudiant-service  # ← Change en minuscules
          predicates:
            - Path=/api/etudiants/**,/api/departements/**
        - id: grading-service
          uri: lb://grading-service  # ← Change en minuscules
          predicates:
            - Path=/api/notes/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    hostname: api-gateway

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always