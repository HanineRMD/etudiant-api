server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: etudiant-service
          uri: lb://etudiant-service
          predicates:
            - Path=/api/etudiants/**
        - id: departement-service
          uri: lb://etudiant-service
          predicates:
            - Path=/api/departements/**
        - id: grading-service
          uri: lb://grading-service
          predicates:
            - Path=/api/notes/**
      # ✅ CORS pour le frontend
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
  instance:
    prefer-ip-address: true