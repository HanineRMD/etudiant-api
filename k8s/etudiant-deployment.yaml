apiVersion: apps/v1
kind: Deployment
metadata:
  name: etudiant-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: etudiant-api
  template:
    metadata:
      labels:
        app: etudiant-api
    spec:
      containers:
        - name: etudiant-api
          image: hanineramdhane/etudiant-service:1.0
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-db:5432/etudiantdb
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: etudiant-api
spec:
  type: NodePort
  ports:
    - port: 8080
      nodePort: 30080
  selector:
    app: etudiant-api